<body>

  <h1>📞 Manual 2-Person Video Call</h1>

  <div class="videos">
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>

<button onclick="startCamera()">Start Camera</button> <br>

<button onclick="createOffer()">Create Offer</button> <button onclick="createAnswer()">Create Answer</button> <button onclick="addAnswer()">Add Answer</button>

  <br>

  <textarea id="offer" placeholder="Offer / Answer will appear here..."></textarea>

  <textarea id="answer" placeholder="Paste answer here..."></textarea>

  <script>
    let localStream;
    let peer = new RTCPeerConnection();

    const localVideo = document.getElementById("localVideo");
    const remoteVideo = document.getElementById("remoteVideo");

    peer.ontrack = e => {
      remoteVideo.srcObject = e.streams[0];
    };

    async function startCamera() {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
      });

      localVideo.srcObject = localStream;

      localStream.getTracks().forEach(track => {
        peer.addTrack(track, localStream);
      });
    }

    async function createOffer() {
      const offer = await peer.createOffer();
      await peer.setLocalDescription(offer);

      document.getElementById("offer").value =
        JSON.stringify(offer);
    }

    async function createAnswer() {
      const offer = JSON.parse(document.getElementById("offer").value);

      await peer.setRemoteDescription(offer);

      const answer = await peer.createAnswer();
      await peer.setLocalDescription(answer);

      document.getElementById("offer").value =
        JSON.stringify(answer);
    }

    async function addAnswer() {
      const answer = JSON.parse(document.getElementById("answer").value);
      await peer.setRemoteDescription(answer);
    }
  </script>

</body>
